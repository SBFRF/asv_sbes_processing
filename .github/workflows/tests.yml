name: Tests and Coverage

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libhdf5-dev libnetcdf-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-mock coverage
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt || echo "Some requirements failed to install, continuing..."
        fi
        pip install numpy pandas h5py netCDF4 scipy matplotlib pyyaml tqdm rasterio contextily wget pyproj pygeodesy
        pip install git+https://github.com/SBFRF/testbedutils.git || echo "testbedutils install failed, continuing..."
        pip install getdatatestbed || echo "getdatatestbed install failed, continuing..."

    - name: Run tests with pytest
      env:
        MPLBACKEND: Agg  # Use non-interactive matplotlib backend for headless CI
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing --tb=short

    - name: Generate coverage report
      run: |
        coverage report -m

    - name: Upload coverage to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-python-${{ matrix.python-version }}
        path: |
          coverage.xml
          htmlcov/

    - name: Check coverage threshold
      run: |
        coverage report --fail-under=25 || echo "Coverage below 25% - continuing anyway"
